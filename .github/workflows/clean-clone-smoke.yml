name: Clean Clone Smoke

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  clean-clone-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[dev,api]'
      - name: Run local validation suite
        run: |
          pytest -q
          ruff check .
          mypy src
          python scripts/check_golden_receipts.py
          python scripts/build_public_evaluation_matrix.py
          python demo/portable-ultrasound/run_demo.py
      - name: Run clean clone smoke
        run: |
          python scripts/clean_clone_smoke.py --repo-url https://github.com/${{ github.repository }}.git --branch ${{ github.ref_name }}
