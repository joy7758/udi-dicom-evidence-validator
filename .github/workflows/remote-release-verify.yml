name: Remote Release Verify

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  remote-release-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[dev,api]'
      - name: Validate public release state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pytest -q
          ruff check .
          mypy src
          python scripts/check_golden_receipts.py
          python scripts/build_public_evaluation_matrix.py
          python scripts/verify_remote_release.py --repo ${{ github.repository }}
