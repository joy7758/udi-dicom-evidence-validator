name: Public Release Assets

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  public-release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[dev,api]'
      - name: Build public release assets
        run: |
          pytest -q
          ruff check .
          mypy src
          python scripts/generate_golden_receipts.py
          python scripts/check_golden_receipts.py
          python scripts/build_public_evaluation_matrix.py
          python scripts/build_public_release_assets.py
      - name: Upload public-safe assets
        uses: actions/upload-artifact@v4
        with:
          name: public-release-assets
          path: artifacts/public-release
